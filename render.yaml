services:
  - type: web
    name: komandirovki-pro
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: YANDEX_AI_STUDIO_API_KEY
        sync: false
      - key: YANDEX_AI_STUDIO_FOLDER_ID
        sync: false
